name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Runtime supports Node >=18 (see package.json engines).
        # Matrix is narrower because vitest 4 tooling needs Node >=20.19.
        # End users don't install devDependencies, so runtime compat on 18 is preserved.
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
